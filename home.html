<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issue Tracker - Abdullah al Mahmud</title>

  <!-- font awesome -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- daisyUI and Tailwind -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- google font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font implementation -->
<style>
  *{
     font-family: "Geist", sans-serif;
  }
</style>



</head>
<body>

  <!-- navbar -->
  <div class="navbar bg-base-100 shadow-sm flex-col  md:flex-row">
  <div class="flex-1 flex items-center">
    <img class="w-10" src="./assets/github-logo.png" alt="">
    <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
  </div>
  <div class="flex gap-2">
    <input id="search-input" type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
    <div class="dropdown dropdown-end">
      <button onclick="loadSearch()" class="btn btn-primary">Search</button>
     
    </div>
  </div>
</div>

<!-- filter bar -->
 <div id="filter" class="bg-base-100 shadow-sm my-5 w-11/12 mx-auto p-4 rounded-sm">
  <button onclick="filter('filter-all')" id="filter-all" class="btn btn-primary">All</button>
  <button onclick="filter('filter-open')" id="filter-open" class="btn">Open</button>
  <button onclick="filter('filter-closed')" id="filter-closed" class="btn">Closed</button>
 </div>

 <!-- issue title -->
  <div class="bg-base-100 shadow-lg mt-5 w-11/12 mx-auto p-4 rounded-sm flex flex-col lg:flex-row  lg:justify-between lg:items-center">
    <!-- left side -->
    <div class="flex items-center gap-4">
      <div class="w-12 h-12  bg-[#A855F730] rounded-full flex justify-center items-center">
        <img src="./assets/Aperture.png" alt="">
      </div>
      
      <div>
        <h1 class="text-xl font-semibold"><span id="issue-count">0</span> Issues</h1>
        <p>Track and manage your project issues</p>
      </div>
    </div>

    <!-- right side -->
     <div class="self-end flex gap-4">
      <div class="flex gap-1 items-center">
        <div class="w-2.5 h-2.5 bg-[#00A96E] rounded-full"></div>
        <p>Open</p>
      </div>
      <div class="flex gap-1 items-center">
        <div class="w-2.5 h-2.5 bg-[#A855F7] rounded-full"></div>
        <p>Closed</p>
      </div>
     </div>
  </div>


  <!-- spinner -->
   <div id="spinner" class="flex justify-center items-start mt-20 hidden">
     <span class="loading loading-spinner loading-xl"></span>
   </div>
  

  <!-- issues container -->
   <div id="issue-container" class="bg-base-100 shadow-lg w-11/12 mx-auto p-4 rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
