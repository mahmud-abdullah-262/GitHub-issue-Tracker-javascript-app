<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>log in</title>

  <!-- daisyUI and Tailwind -->
   <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- google font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font implementation -->
<style>
  *{
     font-family: "Geist", sans-serif;
  }
</style>



</head>
<body>
  
  <div class="hero-content flex-col lg:flex-row-reverse">
    
    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">

        <div class="flex flex-col items-center space-y-2">
      <img src="./assets/github-logo.png" alt="">
      <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
      <p class="text-gray-600">Sign in to manage your issues</p>
        </div>

        <fieldset class="fieldset">
          <label class="label">UserName</label>
          <input type="email" class="input" placeholder="Enter Username" />
          <p>Default: admin</p>
          <label class="label">Password</label>
          <input type="password" class="input" placeholder="Enter Password" />
          <p>Default: admin123</p>
    
          <button class="btn btn-primary mt-4">Login</button>

          
        </fieldset>

        <div class="flex gap-4 justify-center items-center my-5">
            <hr class="border-gray-300 w-full">
            <p>OR</p>
            <hr class="border-gray-300 w-full">
          </div >

          <div class="text-center">
            <p class="text-gray-500 mb-5">Demo Credentials:</p>

            <p class="text-gray-800"><span class="font-bold">Username: </span>admin</p>
            <p class="text-gray-800"> <span class="font-bold">Password: </span>admin123</p>
          </div>
      </div>
    </div>
  </div>

</body>
</html>
